naftiko: 1.0.0-alpha2
info:
  label: Flagsmith Admin API
  description: The Flagsmith Admin API allows developers to programmatically manage all aspects of their Flagsmith projects.
    Anything that can be done through the Flagsmith dashboard can also be accomplished via this API, including creating, updating,
    and deleting projects, environments, feature flags, segments, and users. It uses a secret Organisation API Token for authentication
    and provides a Swagger interface at api.flagsmith.com/api/v1/docs for interactive exploration.
  tags:
  - Flagsmith
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
